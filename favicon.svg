<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#0a1530"/>
    </linearGradient>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer hexagon -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="none" stroke="url(#lg1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Inner hex fill -->
  <polygon points="32,11 50,21.5 50,42.5 32,53 14,42.5 14,21.5"
    fill="url(#lg2)" opacity="0.12"/>

  <!-- T crossbar -->
  <rect x="20" y="28.5" width="24" height="3.5" fill="url(#lg1)" rx="1.5"/>

  <!-- T stem -->
  <rect x="30.25" y="28.5" width="3.5" height="19" fill="url(#lg2)" rx="1.5"/>

  <!-- Top dot -->
  <circle cx="32" cy="17" r="2.5" fill="#00e5ff" opacity="0.95" filter="url(#glow)"/>

  <!-- Side dots -->
  <circle cx="51" cy="32" r="1.8" fill="#0066ff" opacity="0.8"/>
  <circle cx="13" cy="32" r="1.8" fill="#7b2fff" opacity="0.8"/>
</svg>
